[package]
name = "jet1090"
description = "Real-time Mode S and ADS-B data with REST and ZMQ endpoints"
repository = "https://github.com/xoolive/rs1090"
keywords = ["aircraft", "ADS-B", "Mode-S", "decoding"]
readme = "readme.md"
authors.workspace = true
version.workspace = true
license.workspace = true
edition.workspace = true

[features]
rtlsdr = ['rs1090/rtlsdr']

[dependencies]
chrono = "0.4.37"
clap = { version = "4.5.7", features = ["color", "derive", "wrap_help"] }
crossterm = { version = "0.27.0", features = ["event-stream"] }
deku = "0.16.0"
futures = "0.3.30"
futures-util = "0.3.30"
hex = "0.4.3"
ratatui = "0.26.1"
reqwest = "0.12.4"
rs1090 = { version = "0.2.4", path = "../rs1090" }
rusqlite = { version = "0.31.0", features = ["bundled"] }
serde = { version = "1.0.197", features = ["derive"] }
serde_json = "1.0.114"
soapysdr = { version = "0.4.0", optional = true }
tokio = { version = "1.38.0", features = ["full"] }
warp = "0.3.6"
zip = "2.1.3"

env_logger = "0.11.3"
log = "0.4.21"

# websocket support
tokio-stream = "0.1.15"
tower = { version = "0.4.13", features = ["util"] }
tower-http = { version = "0.5.0", features = ["fs", "trace"] }
axum = { version = "0.7.5", features = ["default", "ws"] }
axum-extra = { version = "0.9.3" }
serde_tuple = "0.5.0"
uuid = { version = "1.8.0", features = ["v4"] }
tokio-tungstenite = "0.13.0"


[[bin]]
name = "jet1090"
path = "src/main.rs"
